<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial;
        }

        .wrapper {
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        h2 {
            color: #4caf50;
        }

        .solutions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background-color: #1e1e1e;
            padding: 15px;
            width: 200px;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="wrapper">

<h2 style="text-align:center;">Proposed Solutions</h2>

<div class="solutions">
    <div class="card">
        <h3>Better Roads</h3>
        <p>Regular maintenance and proper construction.</p>
    </div>

    <div class="card">
        <h3>Education</h3>
        <p>Driver awareness and safety campaigns.</p>
    </div>

    <div class="card">
        <h3>Law Enforcement</h3>
        <p>Stricter traffic law implementation.</p>
    </div>
</div>

</div>

</body>
</html>
