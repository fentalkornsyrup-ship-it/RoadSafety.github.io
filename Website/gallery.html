<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial;
        }

        .wrapper {
            max-width: 900px;
            margin: auto;
            padding: 20px;
            text-align: center;
        }

        h2 {
            color: #00bcd4;
        }

        .gallery {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .gallery img {
            width: 200px;
            height: 150px;
            object-fit: cover;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<div class="wrapper">

<h2>The State of Roads</h2>

<div class="gallery">
    <img src="rs1.png">
    <img src="rs2.png">
    <img src="rs3.png">
    <img src="rs4.png">
</div>

</div>

</body>
</html>
