<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial;
        }

        .wrapper {
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        h2 {
            color: #ff5252;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid #555;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #333;
        }
    </style>
</head>

<body>

<div class="wrapper">

<h2 style="text-align:center;">Common Road Issues</h2>

<table>
    <tr>
        <th>Issue</th>
        <th>Description</th>
        <th>Impact</th>
    </tr>
    <tr>
        <td>Potholes</td>
        <td>Damaged road surfaces</td>
        <td>Accidents, vehicle damage</td>
    </tr>
    <tr>
        <td>Traffic Congestion</td>
        <td>Overcrowded roads</td>
        <td>Delays, stress</td>
    </tr>
    <tr>
        <td>Weak Enforcement</td>
        <td>Lack of strict law enforcement</td>
        <td>More violations</td>
    </tr>
</table>

</div>

</body>
</html>
